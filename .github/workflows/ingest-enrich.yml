name: ingest-enrich

# Every 5 hours: pull news (email + Telegram), dedup into notes ([1]), and ENRICH the top-70%
# of this cycle's new picks ([2]: enrich + market + earnings). NO publishing here — enriched
# notes accumulate as candidates for the once-daily `publish` workflow (15:00 MSK).
# Amortizes the heavy enrichment across the day so no single run is huge.
#
# Schedule (UTC): 00:00, 05:00, 15:00, 20:00  (MSK 03:00, 08:00, 18:00, 23:00).
# The 05:00 UTC cycle is the last before publish (12:00 UTC) → finishes ~5h before it.
# The 10:00 UTC slot is intentionally omitted (the 5h pre-publish buffer).

on:
  schedule:
    - cron: "0 0,5,15,20 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fintech-write     # shared with publish + ir-refresh — serializes all repo-writers (no add/add races)
  cancel-in-progress: false

jobs:
  ingest-enrich:
    runs-on: [self-hosted, fly]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Install semantic-search deps
        continue-on-error: true
        run: pip install -r pipeline/semsearch/requirements.txt

      - name: Restore source-text cache
        uses: actions/cache@v4
        with:
          path: pipeline/state/source_cache.jsonl
          key: source-cache-${{ github.run_id }}
          restore-keys: |
            source-cache-

      - name: Restore semantic + IR indexes (split-aware)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash pipeline/relidx.sh restore semindex pipeline/state/newsdb   # news ([2] semantic)
          bash pipeline/relidx.sh restore irindex  pipeline/state/irdb     # IR filings ([2] grounding)

      - name: Ingest (email + telegram) + build items + prep
        env:
          IMAP_HOST: ${{ vars.IMAP_HOST || 'imap.mailbox.org' }}
          IMAP_PORT: "993"
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASS: ${{ secrets.IMAP_PASS }}
          IMAP_FOLDER: ${{ vars.IMAP_FOLDER || 'INBOX' }}
        run: |
          set -e
          DATE=$(date -u +%F)
          python3 pipeline/mail_ingest.py || echo "mail_ingest failed (continuing)"
          python3 pipeline/tg_ingest.py  || echo "tg_ingest failed (continuing)"
          python3 pipeline/mail_to_items.py
          python3 pipeline/fintech_radar.py expand --since 4
          python3 pipeline/daily_source.py prep --date "$DATE" --since 4 --lookback 90

      - name: Heavy AI — ingest-enrich ([1] dedup + [2] enrich top-70%)
        timeout-minutes: 90      # cap the heavy claude step so a hung run still hits Commit (if: always)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_MODEL: "claude-opus-4-8[1m]"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EMBED_MODEL: "qwen/qwen3-embedding-8b"
          EMBED_DIM: "1024"
        run: |
          DATE=$(date -u +%F)
          echo "Using model: $ANTHROPIC_MODEL"
          claude -p "Use the daily-fintech skill in INGEST-ENRICH mode for date $DATE — run ONLY stages [1] (ingest + dedup into notes) and [2] (rank, then FULL heavy-enrich the top-70% of this cycle's picks: enrich + market + earnings). Do NOT run [3] / do NOT publish." \
            --model "$ANTHROPIC_MODEL" \
            --dangerously-skip-permissions \
            --output-format stream-json --verbose > "$RUNNER_TEMP/claude_ingest.jsonl"
          python3 pipeline/token_trace.py "$RUNNER_TEMP/claude_ingest.jsonl" "ingest-enrich"   # tokens + per-tool/skill breakdown

      - name: Commit & push results (race-proof)
        if: always()      # commit partial enrichment even if the heavy step timed out / was preempted
        run: |
          git config user.name  "fintech-enrich-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit"
          else
            git commit -m "ingest-enrich $(date -u +%F_%H%M): notes + enrichment (cloud)"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash && git push && break
              echo "push race, retry $i"; git rebase --abort 2>/dev/null || true; sleep $((RANDOM % 8 + 3))
              [ "$i" = 5 ] && { echo "push failed after 5 retries"; exit 1; }
            done
          fi

      - name: Index new notes (semantic) + persist index
        continue-on-error: true
        timeout-minutes: 20
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          EMBED_MODEL: "qwen/qwen3-embedding-8b"
          EMBED_DIM: "1024"
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then echo "OPENROUTER_API_KEY unset — skipping indexing"; exit 0; fi
          ./pipeline/semsearch/sem index
          bash pipeline/relidx.sh upload semindex pipeline/state/newsdb "semantic index"   # split-aware (<2GB asset)
