name: publish

# Once a day at 12:00 UTC (15:00 MSK): assemble the daily digest from the notes that the
# ingest-enrich cycles already enriched, write it (FLAT v5, two market sections) into the
# separate `digest/` vault, then publish it to telegra.ph and post the link to the Telegram
# channel. Lightweight — NO ingest, NO enrichment. The last enrich cycle (05:00 UTC) finishes
# ~5h before this, so candidates are settled & committed.
# workflow_dispatch accepts an optional `date` input to (re)publish a past day's digest:
# if digest/<date>.md already exists, [3] is skipped and only telegra.ph/Telegram run.

on:
  schedule:
    # GitHub cron is best-effort (often delayed/dropped), so we add backups. Re-runs are no-ops once
    # the day is published: [3] skips if digest/<date>.md exists, and telegra.ph skips on the publish marker.
    - cron: "0 12 * * *"      # 12:00 UTC = 15:00 MSK (primary)
    - cron: "0 14 * * *"      # backup #1
    - cron: "30 16 * * *"     # backup #2
  workflow_dispatch:
    inputs:
      date:
        description: "Digest date YYYY-MM-DD (default: today UTC). If digest/<date>.md already exists it is NOT regenerated — only (re)published to telegra.ph + Telegram."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: fintech-write     # shared with ingest-enrich + ir-refresh — serializes all repo-writers (no add/add races)
  cancel-in-progress: false

jobs:
  publish:
    runs-on: [self-hosted, fly]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Resolve date
        id: d
        env:
          IN_DATE: ${{ github.event.inputs.date }}   # via env (not inline) — no shell injection from dispatch input
        run: |
          DATE="$IN_DATE"
          [ -z "$DATE" ] && DATE=$(date -u +%F)
          echo "$DATE" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' || { echo "bad date '$DATE' (want YYYY-MM-DD)"; exit 1; }
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "Publishing for: $DATE"

      - name: Build the day's digest from enriched notes ([3] → digest/ vault, two market sections)
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_MODEL: "claude-opus-4-8[1m]"
        run: |
          DATE="${{ steps.d.outputs.date }}"
          if [ -f "digest/$DATE.md" ]; then
            echo "digest/$DATE.md already exists — skipping [3] generation; will just (re)publish it."
            exit 0
          fi
          echo "Using model: $ANTHROPIC_MODEL"
          claude -p "Use the daily-fintech skill in PUBLISH mode for date $DATE — run ONLY stage [3]: build the daily digest from already-enriched, not-yet-published notes (top-30, FLAT v5, TWO market sections — Международный / Российский) into the separate digest/ vault as digest/$DATE.md, and mark included notes status:published. Do NOT ingest or enrich." \
            --model "$ANTHROPIC_MODEL" \
            --dangerously-skip-permissions \
            --output-format stream-json --verbose > "$RUNNER_TEMP/claude_publish.jsonl"
          python3 pipeline/token_trace.py "$RUNNER_TEMP/claude_publish.jsonl" "publish"   # tokens + per-tool/skill breakdown

      - name: Publish to telegra.ph + Telegram channel
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL:   ${{ secrets.TELEGRAM_CHANNEL }}
          TELEGRAPH_TOKEN:    ${{ secrets.TELEGRAPH_TOKEN }}
        run: |
          DATE="${{ steps.d.outputs.date }}"
          python3 pipeline/publish_telegraph.py --date "$DATE"

      - name: Commit & push the digest (race-proof)
        run: |
          git config user.name  "fintech-publish-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "nothing to publish"
          else
            git commit -m "publish ${{ steps.d.outputs.date }}: digest -> digest/ vault + telegra.ph/TG (cloud)"
            for i in 1 2 3 4 5; do
              git pull --rebase --autostash && git push && break
              echo "push race, retry $i"; git rebase --abort 2>/dev/null || true; sleep $((RANDOM % 8 + 3))
              [ "$i" = 5 ] && { echo "push failed after 5 retries"; exit 1; }
            done
          fi
